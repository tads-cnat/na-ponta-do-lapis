spring.application.name=na-ponta-do-lapis
server.port=8080

#Altera o endpoint do swagger
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/api-docs

spring.devtools.livereload.enabled=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo
spring.jackson.date-format=dd/MM/yyyy HH:mm
spring.jackson.deserialization.adjust-dates-to-context-time-zone=true

#JPA (Java Persistence API)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ativa o script da data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Libera Requisição atraves do codespace
server.forward-headers-strategy=framework

# ATIVA O PROFILE
# Altere esta variavel para definir o banco "postgres" ou "h2"
spring.profiles.active=postgres