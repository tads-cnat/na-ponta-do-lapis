<div class="w-full h-full flex flex-col items-center rounded-lg py-6">
  <div
    id="forms-familia"
    style="background-color: #f8f8f8"
    class="grid grid-cols-1 w-240 max-w-240px h-160 mx-auto rounded-4xl"
  >
    <div>
      <div id="input-familia" class="w-full h-20 rounded-t-4xl bg-white">
        <div class="flex w-full h-full items-center px-8 gap-4">
          <input
            [(ngModel)]="nomeFamilia"
            class="flex-1 h-full outline-none bg-transparent text-gray-500 text-lg font-bold"
            placeholder="Digite o nome da família"
          />

          <div
            (click)="resetNome()"
            class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center cursor-pointer shrink-0"
          >
            <span class="pi pi-times"></span>
          </div>
        </div>
      </div>
      @if (submitted && !nomeFamilia.trim()) {
        <p class="text-red-500 text-sm mt-1 ml-8">O nome da família é obrigatório.</p>
      }
    </div>

    <div id="actions-familia" class="flex flex-col items-center gap-16 w-full h-full -mt-4">
      <div class="convidar-familia w-[90%] h-30 bg-white rounded-2xl mx-auto p-2 flex flex-col justify-center gap-2">
        <label class="text-md"> Convidar pelo nickname</label>
        <div class="flex justify-start items-center gap-6">
            <input class="w-190 h-12" type="text" pInputText [(ngModel)]="value" placeholder="Escreva o nickname..."/>
            <p-button (click)="adicionarNaListaConvidados(value)" class="right-3" [style]="{'border-radius':'50px', background: '#10B981', 'border-color': '#10B981'}"><app-icon name="plus" class="w-5 h-5" /></p-button>
        </div>
        <div class="h-6 w-150 ">
            @if (message){
                <p class="text-red-500 text-sm">{{ message }}</p>
            }
            @else {
                <p class="text-sm text-gray-500">Convide alguém para a família!</p>
            }
        </div>
      </div>
      <div class="convidados-familia w-[90%] bg-white rounded-2xl mx-auto p-4 flex flex-col justify-center gap-4">
        <div class="flex justify-end">
            <button (click)="limparConvidados()"><span class="pi pi-times cursor-pointer"></span></button>
        </div>
        
        <div class="grid grid-cols-2 min-h-15 max-h-40 justify-center items-center overflow-y-auto gap-2">
            @if (convidados.length === 0) {
                <p class="text-sm text-gray-500 col-span-2 text-center">Nenhum convidado adicionado ainda.</p>
            }
            @for (convidado of convidados; track convidado) {
            <div class="flex items-center gap-4 px-4 py-2 bg-gray-100 rounded-lg">
                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center ">
                    <span class="pi pi-user"></span>
                </div>
                <span class="text-gray-700">{{ convidado }}</span>
                <div class="ml-auto">
                    <button (click)="removerConvidado(convidado)">
                        <span class="pi pi-times cursor-pointer"></span>
                    </button>
                </div>
            </div>
        }
        </div>
        
      </div>
    </div>
  </div>
  <p-button
    label="Criar Família"
    (click)="criarFamilia()"
    [style]="{
      'border-radius': '10px',
      width: '220px',
      height: '50px',
      background: '#10B981',
      'border-color': '#10B981',
      'margin-top': '16px',
    }"
  />
</div>
