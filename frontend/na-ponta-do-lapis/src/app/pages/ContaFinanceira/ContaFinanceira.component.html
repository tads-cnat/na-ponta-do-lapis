<div>
    <div>
        <div class="flex h-screen items-center justify-center ">
            <p-card class="bg-[#F8FAFC]!">
                <div class="flex justify-between items-center mb-3">

                    <h1 class=" text-amber-400 font-bold text-2xl">Movimentações</h1>

                    <div class="flex gap-2">
                        <p-button
                            styleClass=" text-white! !bg-[#3B82F6] !text-slate-70 0 !border-slate-200 hover:!bg-slate-100 shadow-sm">Filtrar</p-button>
                        <p-button (onClick)="abrirDialog()">Adicionar Transação</p-button>
                        <p-floatlabel>
                            <p-iconfield>
                                <p-inputicon class="pi pi-search" />
                                <input pInputText id="over_label" autocomplete="off" />
                            </p-iconfield>
                            <label for="over_label">Buscar</label>
                        </p-floatlabel>
                    </div>
                </div>

                <p-table [value]="contaFinanceiraDados" [paginator]="true" [rows]="5" class="w-100 sm:w-150 md:w-200 lg:w-400">
                    <ng-template pTemplate="header">
                        <tr>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Nome</th>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Saldo</th>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Cor</th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-t>
                        <tr>
                            <td>{{ t.nome }}</td>
                            <td>{{ t.saldo }}</td>
                            <td>{{ t.cor }}</td>
                            <td>
                                <p-button icon="pi pi-trash" (onClick)="excluir(t.id)">

                                </p-button>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </p-card>
        </div>

    </div>


    <form [formGroup]="formContaFinanceira" >
        <p-dialog header="Nova Movimentação" [(visible)]="exibirDialog" [modal]="true">

            <p-button>
                <p-popover></p-popover>
            </p-button>

            <div class="flex flex-col gap-6 mt-4 m-20">
                <div class="grid grid-cols-2 gap-13">
                    <div class="flex flex-col gap-1">
                        <label class="font-bold">Nome</label>
                        <input pInputText formControlName="nome" placeholder="Ex: Banco do Brasil" class="w-full" />
                    </div>

                    <div class="flex flex-col gap-1">
                        <label class="font-bold">Saldo</label>
                        <p-inputNumber formControlName="saldo" locale="pt-BR" inputStyleClass="w-full"/>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-13">
                    <div class="flex flex-col gap-1">
                        <label class="font-bold">Cor</label>
                        <p-colorpicker optionLabel="cor" formControlName="conta"></p-colorpicker>
                    </div>

                </div>

               <div class="flex">

               </div>
            </div>

            <ng-template pTemplate="footer">
                <div class=" flex justify-center w-full mb-5">
                    <p-button styleClass="w-60 h-12 rounded-xl! bg-[#AA7FFF]! border-[#AA7FFF]!" label="Salvar alterações" severity="success" (onClick)="salvar() "></p-button>
                </div>
            </ng-template>
        </p-dialog>
    </form>
