<div>
    <div>
        <div class="flex h-screen items-center justify-center ">
            <p-card class="bg-[#F8FAFC]!">
                <div class="flex justify-between items-center mb-3">

                    <h1 class=" text-amber-400 font-bold text-2xl">Movimentações</h1>

                    <div class="flex gap-2">
                        <p-button
                            styleClass=" text-white! !bg-[#3B82F6] !text-slate-70 0 !border-slate-200 hover:!bg-slate-100 shadow-sm">Filtrar</p-button>
                        <p-button (onClick)="abrirDialog()">Adicionar Transação</p-button>
                        <p-floatlabel>
                            <p-iconfield>
                                <p-inputicon class="pi pi-search" />
                                <input pInputText id="over_label" autocomplete="off" />
                            </p-iconfield>
                            <label for="over_label">Buscar</label>
                        </p-floatlabel>
                    </div>
                </div>

                <p-table [value]="transacoesDados" [paginator]="true" [rows]="5" class="w-100 sm:w-150 md:w-200 lg:w-400">
                    <ng-template pTemplate="header">
                        <tr>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Descrição</th>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Categoria</th>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Conta</th>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Data</th>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Tipo</th>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Estado</th>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Valor</th>
                            <th class="bg-[#F8F8FC]! text-slate-700!">Ações</th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-t>
                        <tr>
                            <td>{{ t.descricao }}</td>
                            <td>{{ t.categoria.nome }}</td>
                            <td>{{ t.conta.nome }}</td>
                            <td>{{ t.dataHora | date:'dd/MM/yyyy' }}</td>
                            <td>
                                <p-tag [value]="t.tipo" [severity]="getSeverity(t.tipo)"></p-tag>
                            </td>
                            <td>{{ t.estado }}</td>
                            <td>{{ t.valor | currency: 'BRL'}}</td>
                            <td>
                                <p-button icon="pi pi-trash" (onClick)="excluir(t.id)">

                                </p-button>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </p-card>
        </div>

    </div>


    <form [formGroup]="formTransacao" >
        <p-dialog header="Nova Movimentação" [(visible)]="exibirDialog" [modal]="true">

            <p-button>
                <p-popover></p-popover>
            </p-button>

            <div class="flex flex-col gap-6 mt-4 m-20">
                <div class="grid grid-cols-2 gap-13">
                    <div class="flex flex-col gap-1">
                        <label class="font-bold">Descrição</label>
                        <input pInputText formControlName="descricao" placeholder="Ex: Internet" class="w-full" />
                    </div>

                    <div class="flex flex-col gap-1">
                        <label class="font-bold">Valor</label>
                        <p-inputNumber formControlName="valor" mode="currency" currency="BRL" locale="pt-BR" styleClass="w-full" inputStyleClass="w-full"/>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-13">
                    <div class="flex flex-col gap-1">
                        <label class="font-bold">Conta</label>

                        <p-select [options]="opcoesConta" optionLabel="nome" optionValue="id" formControlName="conta"
                            placeholder="Selecione" [appendTo]="'body'" styleClass="w-full"></p-select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="font-bold">Categoria</label>
                        <p-select [options]="opcoesCategoria" optionLabel="nome" optionValue="id"
                            formControlName="categoria" placeholder="Selecione" [appendTo]="'body'" styleClass="w-full"></p-select>

                    </div>

                </div>

               <div class="flex">
                 <div class="grid grid-cols-2 gap-4">

                    <div class="flex flex-col gap-1">
                        <label class="font-bold">Estado</label>
                        <p-select [options]="opcoesEstado" formControlName="estado" optionLabel="label"
                            optionValue="value" placeholder="Selecione" [appendTo]="'body'"></p-select>
                    </div>
                </div>
                 <div class="grid grid-cols-2 gap-4">

                    <div class="flex flex-col gap-1">
                        <label class="font-bold">Estado</label>
                        <p-select [options]="opcoesEstado" formControlName="estado" optionLabel="label"
                            optionValue="value" placeholder="Selecione" [appendTo]="'body'"></p-select>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="font-bold">Tipo</label>
                    <div class="flex gap-4">
                        <div class="flex items-center">
                            <p-select [options]="opcoesTipo" formControlName="tipo" optionLabel="label"
                                optionValue="value" placeholder="Selecione o Tipo" [appendTo]="'body'"></p-select>
                        </div>
                    </div>
                </div>
               </div>
            </div>

            <ng-template pTemplate="footer">
                <div class=" flex justify-center w-full mb-5">
                    <p-button styleClass="w-60 h-12 rounded-xl! bg-[#AA7FFF]! border-[#AA7FFF]!" label="Salvar alterações" severity="success" (onClick)="salvar() "></p-button>
                </div>
            </ng-template>
        </p-dialog>
    </form>
