<div [formGroup]="formGroupPai" class="flex flex-col gap-4">
  <h2 class="text-[#000000] font-semibold text-lg">{{ titulo }}</h2>
  
  <div class="grid grid-cols-2 gap-x-6 gap-y-4">
    <div *ngFor="let campo of campos" class="flex flex-col gap-2">
      <label class="text-[#000000] text-sm font-medium min-h-[20px]">
        {{ campo.label ? campo.label : '&nbsp;' }}
      </label>

      <div *ngIf="campo.key === 'celular'; else inputPadrao" class="flex gap-2 w-full h-12">
        <div class="w-16 h-full flex items-center justify-center bg-[#EBEBEB] text-[#9E9E9E] rounded-xl font-medium text-sm">
          +55
        </div>
        <input 
          [type]="campo.type || 'text'" 
          [placeholder]="campo.placeholder" 
          [formControlName]="campo.key"
          class="flex-1 h-full px-4 bg-[#EBEBEB] border-none rounded-xl text-black placeholder-[#9E9E9E] focus:outline-none focus:ring-2 focus:ring-[#6A1B9A] transition-all"
        />
      </div>

      <ng-template #inputPadrao>
        <input 
          [type]="campo.type || 'text'" 
          [placeholder]="campo.placeholder" 
          [formControlName]="campo.key"
          class="w-full h-12 px-4 bg-[#EBEBEB] border-none rounded-xl text-black placeholder-[#9E9E9E] focus:outline-none focus:ring-2 focus:ring-[#6A1B9A] transition-all"
        />
      </ng-template>
    </div>
  </div>
</div>
