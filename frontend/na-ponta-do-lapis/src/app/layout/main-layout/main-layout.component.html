<div class="layout-body flex h-dvh overflow-hidden">
    <app-sidebar></app-sidebar>
    <div class="flex flex-col flex-1 overflow-hidden">
        <app-header></app-header>
        <!--
          FIX 5: Adicionado overflow-y-auto ao <main>.
          O pai tem overflow-hidden, então sem overflow-y-auto aqui
          o conteúdo do dashboard (e demais páginas) seria clipado
          silenciosamente ao invés de criar scroll.
          m-auto removido: em flex-col com flex-1 não tem efeito útil
          e pode causar margens indesejadas em viewports menores.
        -->
        <main class="flex flex-col flex-1 w-full px-4 lg:px-12 py-5 overflow-y-auto">
            <p-toast></p-toast>
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
