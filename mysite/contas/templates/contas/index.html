{% extends 'base.html' %}

{% block page_title %}Contas Financeiras{% endblock %}
{% block title %}Minhas Contas{% endblock %}

{% block main %}
<div class="w-full max-w-5xl mx-auto px-4">
    <!-- Carousel de contas -->
    <div class="relative flex items-center justify-center mb-32">
        <!-- Grupo de cartões -->
        <div class="relative w-[400px] h-[252px] flex items-center justify-center">
            <!-- Cartão da esquerda (vermelho) -->
            <div class="absolute left-0 z-10 transform -translate-x-40 scale-90">
                <div class="card w-[500px] h-[252px] bg-red-700 text-white shadow-xl opacity-60">
                    <div class="card-body p-10">
                        <div class="flex flex-col h-full">
                            <div class="flex justify-between mb-8">
                                <input type="text" placeholder="Nome"
                                    class="input input-ghost text-xl placeholder-white w-1/2" readonly>
                                <input type="text" placeholder="Tipo"
                                    class="input input-ghost text-xl text-right placeholder-white w-1/3" readonly>
                            </div>
                            <div class="flex-grow flex items-center justify-center">
                                <input type="text" placeholder="Saldo"
                                    class="input input-ghost text-xl text-center placeholder-white w-2/3" readonly>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cartão principal (centro) -->
            <div class="z-20">
                <div class="card w-[500px] h-[285px] bg-gray-950 text-white shadow-2xl">
                    <div class="card-body p-10">
                        <div class="flex flex-col h-full">
                            <div class="flex justify-between mb-8">
                                <input type="text" placeholder="Nome"
                                    class="input input-ghost text-xl placeholder-white w-1/2" readonly>
                                <input type="text" placeholder="Tipo"
                                    class="input input-ghost text-xl text-right placeholder-white w-1/3" readonly>
                            </div>
                            <div class="flex-grow flex items-center justify-center">
                                <input type="text" placeholder="Saldo"
                                    class="input input-ghost text-xl text-center placeholder-white w-2/3" readonly>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cartão da direita (branco) -->
            <div class="absolute right-0 z-10 transform translate-x-40 scale-90">
                <div class="card w-[400px] h-[252px] bg-gray-100 text-black shadow-xl opacity-60">
                    <div class="card-body p-10">
                        <div class="flex flex-col h-full">
                            <div class="flex justify-between mb-8">
                                <input type="text" placeholder="Nome"
                                    class="input input-ghost text-xl placeholder-gray-950 w-1/2" readonly>
                                <input type="text" placeholder="Tipo"
                                    class="input input-ghost text-xl text-right placeholder-gray-950 w-1/3" readonly>
                            </div>
                            <div class="flex-grow flex items-center justify-center">
                                <input type="text" placeholder="Saldo"
                                    class="input input-ghost text-xl text-center placeholder-gray-950 w-2/3" readonly>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botões de navegação do carrossel -->
        <button
            class="btn btn-circle btn-ghost text-3xl absolute left-4 z-30 bg-white hover:bg-gray-800 backdrop-blur-sm border-2 border-black transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>

        <button
            class="btn btn-circle btn-ghost text-3xl absolute right-4 z-30 bg-white hover:bg-gray-800 backdrop-blur-sm border-2 border-black transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </button>
    </div>

    <!-- Botões de ação em grid 2x2 -->
    <div class="grid grid-cols-2 gap-6 px-24">
        <a href="#"
            class="btn btn-ghost border-2 border-gray-600 hover:border-black hover:bg-white hover:text-black text-gray-600 font-medium h-28 text-xl transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 mr-3" viewBox="0 0 20 20" fill="currentColor">
                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                <path fill-rule="evenodd"
                    d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"
                    clip-rule="evenodd" />
            </svg>
            Visualizar Conta
        </a>
        <a href="#"
            class="btn btn-ghost border-2 border-gray-600 hover:border-black hover:bg-white hover:text-black text-gray-600 font-medium h-28 text-xl transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 mr-3" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
                    clip-rule="evenodd" />
            </svg>
            Adicionar Conta
        </a>
        <a href="#"
            class="btn btn-ghost border-2 border-gray-600 hover:border-black hover:bg-white hover:text-black text-gray-600 font-medium h-28 text-xl transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 mr-3" viewBox="0 0 20 20" fill="currentColor">
                <path
                    d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
            </svg>
            Editar Conta
        </a>
        <a href="#"
            class="btn btn-ghost border-2 border-gray-600 hover:border-black hover:bg-white hover:text-black text-gray-600 font-medium h-28 text-xl transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 mr-3" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                    clip-rule="evenodd" />
            </svg>
            Excluir Conta
        </a>
    </div>
</div>
</div>
{% endblock %}
