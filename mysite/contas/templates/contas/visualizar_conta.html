<!-- Modal de Visualizar Conta (DaisyUI) -->
<!-- toggle input control (DaisyUI) -->
<input type="checkbox" id="viewAccountModalToggle" class="modal-toggle" style="display:none;" />
<div class="modal">
    <div class="modal-box relative bg-gray-300 rounded-xl max-w-5xl p-8">
        <label for="viewAccountModalToggle" id="closeViewAccountModal"
            class="btn btn-sm btn-ghost absolute right-4 top-4">✕</label>
        <h3 class="text-3xl font-bold text-black text-center mb-8">Informações da Conta/<br>Histórico de transações</h3>

        <!-- Informações da Conta -->
        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg p-6">
                <label class="block text-base font-semibold text-gray-600 mb-2">Nome da Conta</label>
                <p class="text-2xl font-bold text-black text-center">Conta de Fulano</p>
            </div>
            <div class="bg-white rounded-lg p-6">
                <label class="block text-base font-semibold text-gray-600 mb-2">Saldo da Conta</label>
                <p class="text-2xl font-bold text-black text-center">R$ 120,00</p>
            </div>
            <div class="bg-white rounded-lg p-6">
                <label class="block text-base font-semibold text-gray-600 mb-2">Tipo da Conta</label>
                <p class="text-2xl font-bold text-black text-center">CRÉDITO</p>
            </div>
        </div>

        <!-- Histórico -->
        <div class="mb-4">
            <h3 class="text-lg font-bold text-black bg-white p-3 rounded-lg">Histórico</h3>
        </div>

        <!-- Tabela de Transações -->
        <div class="overflow-x-auto mb-6">
            <table class="w-full bg-white rounded-lg overflow-hidden">
                <thead class="bg-gray-400 text-black">
                    <tr>
                        <th class="px-4 py-3 text-left font-semibold">Estado</th>
                        <th class="px-4 py-3 text-left font-semibold">Data/Hora</th>
                        <th class="px-4 py-3 text-left font-semibold">Valor</th>
                        <th class="px-4 py-3 text-left font-semibold">Descrição</th>
                        <th class="px-4 py-3 text-left font-semibold">Tipo</th>
                        <th class="px-4 py-3 text-left font-semibold">Categoria</th>
                        <th class="px-4 py-3 text-left font-semibold">Conta</th>
                    </tr>
                </thead>
                <tbody class="text-black">
                    <!-- Transação 1 -->
                    <tr class="border-b border-gray-200 hover:bg-gray-50">
                        <td class="px-4 py-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-500" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                                    clip-rule="evenodd" />
                            </svg>
                        </td>
                        <td class="px-4 py-3">26/09 14:32</td>
                        <td class="px-4 py-3 font-semibold text-red-500">R$ 44,90</td>
                        <td class="px-4 py-3">Netflix</td>
                        <td class="px-4 py-3">
                            <span class="bg-red-200 text-red-800 px-2 py-1 rounded text-sm font-semibold">Despesa</span>
                        </td>
                        <td class="px-4 py-3">
                            <span
                                class="bg-blue-200 text-blue-800 px-2 py-1 rounded text-sm font-semibold">Streaming</span>
                        </td>
                        <td class="px-4 py-3">Fulano</td>
                    </tr>
                    <!-- Transação 2 -->
                    <tr class="border-b border-gray-200 hover:bg-gray-50">
                        <td class="px-4 py-3">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                                    clip-rule="evenodd" />
                            </svg>
                        </td>
                        <td class="px-4 py-3">22/09 03:00</td>
                        <td class="px-4 py-3 font-semibold text-green-500">R$ 600,00</td>
                        <td class="px-4 py-3">Salário</td>
                        <td class="px-4 py-3">
                            <span
                                class="bg-green-200 text-green-800 px-2 py-1 rounded text-sm font-semibold">Receita</span>
                        </td>
                        <td class="px-4 py-3">
                            <span class="bg-yellow-200 text-yellow-800 px-2 py-1 rounded text-sm font-semibold">Renda
                                Fixa</span>
                        </td>
                        <td class="px-4 py-3">Fulano</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Botão de Fechar -->
        <div class="flex gap-4 justify-end">
            <label for="viewAccountModalToggle"
                class="px-6 py-3 bg-gray-400 text-black font-semibold rounded-lg hover:bg-gray-500 transition-all cursor-pointer">
                Fechar
            </label>
        </div>
    </div>
</div>
