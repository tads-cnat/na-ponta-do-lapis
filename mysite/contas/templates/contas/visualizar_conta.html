<!-- Modal de Visualizar Conta (DaisyUI) -->
<!-- toggle input control (DaisyUI) -->
<input type="checkbox" id="viewAccountModalToggle" class="modal-toggle" style="display:none;" />
<div class="modal">
    <div class="modal-box relative bg-gray-300 rounded-xl max-w-5xl p-8">
        <label for="viewAccountModalToggle" id="closeViewAccountModal"
            class="btn btn-sm btn-ghost absolute right-4 top-4">✕</label>
        <h3 class="text-3xl font-bold text-black text-center mb-8">Informações da Conta/<br>Histórico de transações</h3>

        <!-- Informações da Conta -->
        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg p-6">
                <label class="block text-base font-semibold text-gray-600 mb-2">Nome da Conta</label>
                <p id="viewAccountName" class="text-2xl font-bold text-black text-center">-</p>
            </div>
            <div class="bg-white rounded-lg p-6">
                <label class="block text-base font-semibold text-gray-600 mb-2">Saldo da Conta</label>
                <p id="viewAccountBalance" class="text-2xl font-bold text-black text-center">R$ 0,00</p>
            </div>
            <div class="bg-white rounded-lg p-6">
                <label class="block text-base font-semibold text-gray-600 mb-2">Tipo da Conta</label>
                <p id="viewAccountType" class="text-2xl font-bold text-black text-center">-</p>
            </div>
        </div>

        <!-- Container para transações ou mensagem vazia -->
        <div id="viewTransactionsContainer"></div>

        <!-- Botão de Fechar -->
        <div class="flex gap-4 justify-end mt-6">
            <label for="viewAccountModalToggle"
                class="px-6 py-3 bg-gray-400 text-black font-semibold rounded-lg hover:bg-gray-500 transition-all cursor-pointer">
                Fechar
            </label>
        </div>
    </div>
    <label class="modal-backdrop" for="viewAccountModalToggle"></label>
</div>

<!-- Modal de Sem Transações (DaisyUI) -->
<!-- toggle input control (DaisyUI) -->
<input type="checkbox" id="noTransactionsModalToggle" class="modal-toggle" style="display:none;" />
<div class="modal">
    <div class="modal-box relative bg-gray-300 rounded-xl max-w-2xl p-8">
        <label for="noTransactionsModalToggle" id="closeNoTransactionsModal"
            class="btn btn-sm btn-ghost absolute right-4 top-4">✕</label>
        <h3 class="text-3xl font-bold text-black text-center mb-6">Nenhuma Transação</h3>

        <!-- Mensagem -->
        <div class="text-center mb-8 space-y-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-gray-400 mx-auto" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-xl text-black font-semibold">
                Essa conta ainda não possui transações.
            </p>
            <p class="text-lg text-gray-700">
                Clique no botão abaixo para criar sua primeira transação!
            </p>
        </div>

        <!-- Botões de Ação -->
        <div class="flex gap-4 justify-center">
            <label for="noTransactionsModalToggle"
                class="px-6 py-3 bg-red-300 text-red-900 font-semibold rounded-lg cursor-pointer hover:bg-red-400">
                Voltar
            </label>
            <a href="/transacoes/"
                class="px-6 py-3 bg-green-400 text-green-900 font-semibold rounded-lg hover:bg-green-500 text-center">
                Ir para Transações
            </a>
        </div>
    </div>
    <label class="modal-backdrop" for="noTransactionsModalToggle"></label>
</div>
