<!-- Modal de Editar Conta (DaisyUI) -->
<!-- toggle input control (DaisyUI) -->
<input type="checkbox" id="editAccountModalToggle" class="modal-toggle" style="display:none;" />
<div class="modal">
    <div class="modal-box relative bg-gray-300 rounded-xl max-w-3xl p-8">
        <label for="editAccountModalToggle" id="closeEditAccountModal"
            class="btn btn-sm btn-ghost absolute right-4 top-4">✕</label>
        <h3 class="text-3xl font-bold text-black text-center mb-6">Editar Conta</h3>

        <!-- Exibição de Erros -->
        <div id="editErrorContainer" class="hidden mb-4 p-4 bg-red-100 border-2 border-red-500 rounded-lg">
            <div class="text-red-800 font-semibold mb-2">Erros encontrados:</div>
            <ul id="editErrorList" class="text-red-700 space-y-1"></ul>
        </div>

        <!-- Formulário -->
        <form id="editAccountForm" class="space-y-6" method="post" action="#">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-lg font-semibold text-black mb-2">Nome da Conta</label>
                    <input type="text" id="editAccountName" name="nome" placeholder="Digite o nome da conta"
                        class="w-full px-6 py-4 bg-white rounded-lg text-black placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-black text-xl" />
                </div>
                <div>
                    <label class="block text-lg font-semibold text-black mb-2">Saldo da Conta</label>
                    <input type="text" id="editAccountBalance" name="saldo" placeholder="R$ 0,00"
                        class="w-full px-6 py-4 bg-white rounded-lg text-black placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-black text-xl text-right font-bold" />
                </div>
            </div>

            <!-- Tipo de Conta -->
            <div>
                <label class="block text-lg font-semibold text-black mb-3">Selecione um tipo</label>
                <div class="flex gap-6 justify-center">
                    <button type="button" data-type="CREDITO"
                        class="edit-account-type-btn px-8 py-6 rounded-lg font-bold text-2xl bg-white text-black border-2 border-gray-300 shadow-md">CRÉDITO</button>
                    <button type="button" data-type="DEBITO"
                        class="edit-account-type-btn px-8 py-6 rounded-lg font-bold text-2xl bg-gray-900 text-white shadow-md">DÉBITO</button>
                    <button type="button" data-type="CREDITO_DEBITO"
                        class="edit-account-type-btn px-8 py-6 rounded-lg font-bold text-2xl bg-red-500 text-white shadow-md">CRÉDITO
                        E<br />DÉBITO</button>
                </div>
                <input type="hidden" id="selectedEditAccountType" name="tipo" value="">
            </div>

            <!-- Botões de Ação -->
            <div class="flex gap-8 justify-center mt-8">
                <label for="editAccountModalToggle" id="cancelEditAccountBtn"
                    class="flex items-center gap-3 px-8 py-4 bg-red-300 text-red-900 font-semibold rounded-lg cursor-pointer hover:bg-red-400">
                    <span class="text-2xl">✕</span> Cancelar
                </label>
                <button type="submit"
                    class="flex items-center gap-3 px-8 py-4 bg-green-400 text-green-900 font-semibold rounded-lg hover:bg-green-500">
                    <span class="text-2xl">✓</span> Salvar Alterações
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const editAccountForm = document.getElementById('editAccountForm');
        const editAccountNameInput = document.getElementById('editAccountName');
        const editAccountBalanceInput = document.getElementById('editAccountBalance');
        const selectedEditAccountType = document.getElementById('selectedEditAccountType');
        const editErrorContainer = document.getElementById('editErrorContainer');
        const editErrorList = document.getElementById('editErrorList');
        const editAccountTypeButtons = document.querySelectorAll('.edit-account-type-btn');

        // Gerenciar seleção de tipo de conta
        editAccountTypeButtons.forEach(button => {
            button.addEventListener('click', function (e) {
                e.preventDefault();
                editAccountTypeButtons.forEach(btn => {
                    btn.classList.remove('ring-2', 'ring-yellow-400');
                    btn.style.opacity = '1';
                });
                this.classList.add('ring-2', 'ring-yellow-400');
                selectedEditAccountType.value = this.dataset.type;
            });
        });

        // Validação de formulário
        editAccountForm.addEventListener('submit', function (e) {
            e.preventDefault();
            editErrorList.innerHTML = '';
            editErrorContainer.classList.add('hidden');

            const errors = [];

            // Validar nome
            if (!editAccountNameInput.value.trim()) {
                errors.push('Nome da conta é obrigatório');
            } else if (editAccountNameInput.value.trim().length < 3) {
                errors.push('Nome da conta deve ter pelo menos 3 caracteres');
            }

            // Validar saldo
            if (!editAccountBalanceInput.value.trim()) {
                errors.push('Saldo da conta é obrigatório');
            } else {
                const saldo = parseFloat(editAccountBalanceInput.value.replace(/[^0-9,.-]/g, '').replace(',', '.'));
                if (isNaN(saldo) || saldo < 0) {
                    errors.push('Saldo deve ser um número válido e não-negativo');
                }
            }

            // Validar tipo
            if (!selectedEditAccountType.value) {
                errors.push('Tipo de conta é obrigatório');
            }

            if (errors.length > 0) {
                editErrorList.innerHTML = errors.map(err => `<li>• ${err}</li>`).join('');
                editErrorContainer.classList.remove('hidden');
            } else {
                this.submit();
            }
        });

        // Resetar formulário quando modal fechar
        const editToggle = document.getElementById('editAccountModalToggle');
        if (editToggle) {
            editToggle.addEventListener('change', function () {
                if (!this.checked && modalManager) {
                    modalManager.resetFormEdit();
                }
            });
        }
    });
</script>
