name: CI — Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Build Backend (Spring Boot)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build com Maven (sem testes)
        working-directory: backend/na-ponta-do-lapis
        run: ./mvnw package -DskipTests --no-transfer-progress

  frontend:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/na-ponta-do-lapis/package-lock.json

      - name: Instalar dependências
        working-directory: frontend/na-ponta-do-lapis
        run: run: npm install

      - name: Build Angular
        working-directory: frontend/na-ponta-do-lapis
        run: npm run build
